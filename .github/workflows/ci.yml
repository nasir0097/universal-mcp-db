name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ODBC driver (for pyodbc / SQL Server tests)
        run: |
          curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
            | gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
          curl -fsSL https://packages.microsoft.com/config/ubuntu/22.04/prod.list \
            -o /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          sudo ACCEPT_EULA=Y apt-get install -y -qq msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov bandit httpx

      - name: Copy example config
        run: cp config.example.json config.json

      - name: Run tests
        run: |
          pytest tests/test_server.py tests/test_smoke.py \
                 tests/test_security.py tests/test_sql_chain.py \
                 -v --tb=short --junitxml=results.xml
        env:
          PYTHONDONTWRITEBYTECODE: "1"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results.xml

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan (HIGH severity only — MEDIUM issues are nosec-annotated)
        run: |
          bandit -r server.py db.py roles.py \
            -l \
            -f txt \
            --exit-zero
          bandit -r server.py db.py roles.py \
            -l \
            -f json \
            -o bandit-report.json || true
          # Fail only on HIGH severity
          python - <<'EOF'
          import json, sys
          try:
              with open("bandit-report.json") as f:
                  report = json.load(f)
          except Exception:
              sys.exit(0)
          high = [i for i in report.get("results", []) if i["issue_severity"] == "HIGH"]
          if high:
              for i in high:
                  print(f"HIGH: {i['filename']}:{i['line_number']} — {i['issue_text']}")
              sys.exit(1)
          print(f"Bandit: 0 HIGH issues found ({len(report.get('results',[]))} total medium/low)")
          EOF

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t universal-mcp-db .

      - name: Smoke test container
        run: |
          cp config.example.json config.json
          docker run -d --name test-server -p 7654:7654 \
            -v $(pwd)/config.json:/app/config.json universal-mcp-db
          sleep 5
          curl -f http://localhost:7654/health
          docker stop test-server
