name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # Strip pyodbc — needs ODBC driver not available in CI, tests use SQLite only
          python -c "
          lines = open('requirements.txt').readlines()
          open('requirements-ci.txt','w').writelines(
              l for l in lines if not l.startswith('pyodbc') and not l.startswith('pywinrm')
          )"
          pip install -r requirements-ci.txt
          pip install pytest pytest-cov bandit

      - name: Copy example config
        run: cp config.example.json config.json

      - name: Run tests
        run: |
          pytest tests/test_server.py tests/test_smoke.py \
                 tests/test_security.py tests/test_sql_chain.py \
                 -v --tb=short --junitxml=results.xml
        env:
          PYTHONDONTWRITEBYTECODE: "1"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results.xml

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan (HIGH severity only — MEDIUM issues are nosec-annotated)
        run: |
          bandit -r server.py db.py roles.py \
            -l \
            -f txt \
            --exit-zero
          bandit -r server.py db.py roles.py \
            -l \
            -f json \
            -o bandit-report.json || true
          # Fail only on HIGH severity
          python - <<'EOF'
          import json, sys
          try:
              with open("bandit-report.json") as f:
                  report = json.load(f)
          except Exception:
              sys.exit(0)
          high = [i for i in report.get("results", []) if i["issue_severity"] == "HIGH"]
          if high:
              for i in high:
                  print(f"HIGH: {i['filename']}:{i['line_number']} — {i['issue_text']}")
              sys.exit(1)
          print(f"Bandit: 0 HIGH issues found ({len(report.get('results',[]))} total medium/low)")
          EOF

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t universal-mcp-db .

      - name: Smoke test container
        run: |
          cp config.example.json config.json
          docker run -d --name test-server -p 7654:7654 \
            -v $(pwd)/config.json:/app/config.json universal-mcp-db
          sleep 5
          curl -f http://localhost:7654/health
          docker stop test-server
